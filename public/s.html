<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoboothX</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fbf8f2;
      color: #111;
      text-align: center;
    }

    .header {
      background: #090909;
      padding: 28px 20px;
      color: white;
      font-size: 34px;
      font-weight: 300;
      letter-spacing: -1px;
    }

    .header span {
      color: #c9a24a;
      font-weight: 700;
    }

    .content {
      padding: 34px 22px 44px;
      max-width: 520px;
      margin: auto;
    }

    .small-title {
      color: #c9a24a;
      letter-spacing: 4px;
      font-size: 13px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 42px;
      line-height: 1.05;
      margin: 0;
      font-weight: 500;
    }

    .date {
      margin-top: 14px;
      font-size: 15px;
      letter-spacing: 2px;
    }

    .strip {
      margin: 34px auto 26px;
      width: 86%;
      max-width: 330px;
      background: white;
      padding: 10px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.16);
    }

    .strip img {
      width: 100%;
      display: block;
    }

    .hint {
      color: #333;
      font-size: 16px;
      margin-bottom: 22px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 86%;
      max-width: 360px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #b88a2d, #d7b766);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 1px;
      box-shadow: 0 12px 28px rgba(184,138,45,0.28);
    }

    .footer {
      margin-top: 30px;
      color: #555;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .heart {
      color: #c9a24a;
    }
  </style>
</head>

<body>
  <div class="header">Photobooth<span>X</span></div>

  <main class="content">
    <div class="small-title">Bedankt voor het feest!</div>

    <h1 id="eventName">PhotoboothX</h1>

    <div class="date" id="eventDate"></div>

    <div class="strip">
      <img id="stripImage" src="" alt="Photobooth fotostrip" />
    </div>

    <div class="hint">Scan of download je foto</div>

    <a id="downloadButton" class="button" href="#" download="photoboothx.jpg">
      ↓ DOWNLOAD FOTO
    </a>

    <div class="footer">
      <span class="heart">♥</span> Gemaakt met liefde door PhotoboothX
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const img = params.get("img");
    const eventName = params.get("event") || "PhotoboothX";
    const date = params.get("date") || "";

    document.getElementById("eventName").textContent = eventName;
    document.getElementById("eventDate").textContent = date;

    if (img) {
      document.getElementById("stripImage").src = img;
      document.getElementById("downloadButton").href = img;
    }
  </script>
</body>
</html>
